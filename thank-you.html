<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Thank You | SUGURESH</title>
    <meta
      name="description"
      content="Thank you for contacting Suguresh"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <link rel="shortcut icon" type="image/x-icon" href="/images/logo.png" />

    <!-- STYLESHEETS -->
    <link
      rel="stylesheet"
      href="/css/bootstrap.min.css"
      type="text/css"
      media="all"
    />
    <link
      rel="stylesheet"
      href="/css/all.min.css"
      type="text/css"
      media="all"
    />
    <link
      rel="stylesheet"
      href="/css/simple-line-icons.css"
      type="text/css"
      media="all"
    />
    <link rel="stylesheet" href="/css/style.css" type="text/css" media="all" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
      :root {
        --accent-color: #3498db;
      }
      
      .thank-you-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background-color: var(--body-color);
      }
      
      .thank-you-card {
        background-color: var(--bg-white-color);
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(0,0,0,0.1);
        max-width: 600px;
        width: 90%;
      }
      
      .check-icon {
        font-size: 60px;
        color: #2ecc71;
        margin-bottom: 20px;
      }
      
      .home-button {
        margin-top: 30px;
      }
    </style>
  </head>

  <body>
    <div class="thank-you-container">
      <div class="thank-you-card animate__animated animate__fadeIn">
        <i class="fas fa-check-circle check-icon animate__animated animate__bounceIn animate__delay-1s"></i>
        <h1>Thank You!</h1>
        <p class="lead">Your message has been sent successfully.</p>
        <p>I'll get back to you as soon as possible.</p>
        <a href="/" class="btn btn-default home-button animate__animated animate__fadeInUp animate__delay-1s">
          <i class="icon-home mr-2"></i>Back to Homepage
        </a>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/jquery-1.12.3.min.js"></script>
    <script>
      // Enable dark mode if it was enabled on the main page
      document.addEventListener('DOMContentLoaded', function() {
        const darkMode = localStorage.getItem('darkMode');
        if (darkMode === 'enabled') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      });
    </script>
  </body>
</html>
